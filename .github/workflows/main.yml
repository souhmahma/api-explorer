name: CI Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Services
        run: docker compose build

      - name: Start and Verify Services
        run: |
          docker compose up -d
          sleep 20
          curl -f http://localhost:8000/api/products/ || (docker compose logs backend && exit 1)
          curl -f http://localhost:3000 || (docker compose logs frontend && exit 1)

      - name: Shutdown
        if: always()
        run: docker compose down
